name: Daily Automated Commit - 23f2003092@ds.study.iitm.ac.in
run-name: Daily Commit Run - 23f2003092@ds.study.iitm.ac.in
on:
  schedule:
    - cron: '17 2 * * *'   # Runs daily at 02:17 UTC (specific time, no wildcards)
  workflow_dispatch:       # Allows manual trigger for testing

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Automation Bot"
          git config user.email "23f2003092@ds.study.iitm.ac.in"

      - name: Daily update commit - 23f2003092@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-update.log
          git add daily-update.log
          git commit -m "Automated daily commit on $(date -u)" || echo "No changes to commit"
          git push

          
